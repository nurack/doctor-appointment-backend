<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Password Updated Successfully</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 20px auto;
            background-color: #ffffff;
        }
        .header {
            background-color: #10b981;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .content {
            padding: 25px;
            line-height: 1.6;
        }
        .footer {
            background-color: #f4f4f4;
            color: #666;
            padding: 15px;
            text-align: center;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Password Updated</h2>
    </div>

    <div class="content">
        <p>Hello <strong th:text="${name}"></strong>,</p>

        <p>Your AHS Health account password has been successfully updated.</p>

        <p>If you made this change, you can ignore this email.</p>

        <p>If you did not make this change, please contact support immediately.</p>

        <p>Thank you,<br>The AHS Health Team</p>
    </div>

    <div class="footer">
        &copy; <span th:text="${T(java.time.Year).now()}">2026</span> AHS Health. All rights reserved.
    </div>
</div>
</body>
</html>
